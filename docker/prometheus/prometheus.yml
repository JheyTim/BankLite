# Global Prometheus settings.
global:
  # Prometheus will scrape configured targets every 15 seconds.
  scrape_interval: 15s

  # Prometheus will evaluate alerting rules every 15 seconds.
  # We are not adding alert rules yet, but this prepares the config.
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scrapes itself so we can confirm metrics collection works immediately.
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'prometheus:9090'

